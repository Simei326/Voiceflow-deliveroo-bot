<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deliveroo Support Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 36px 32px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #00CCBC;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .logo svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    .card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.9rem;
      color: #6b6b6b;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .widget-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #00CCBC;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(0, 204, 188, 0.35);
      text-decoration: none;
      width: 100%;
      justify-content: center;
    }

    .widget-btn:hover {
      background: #00b5a6;
      box-shadow: 0 6px 18px rgba(0, 204, 188, 0.45);
      transform: translateY(-1px);
    }

    .widget-btn:active {
      transform: translateY(0);
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 20px;
      color: #c0c0c0;
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ececec;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .topic-chip {
      background: #f5f5f0;
      color: #444;
      font-size: 0.78rem;
      border-radius: 50px;
      padding: 6px 14px;
      cursor: pointer;
      border: 1px solid #e8e8e8;
      transition: background 0.15s, border-color 0.15s;
    }

    .topic-chip:hover {
      background: #e8faf8;
      border-color: #00CCBC;
      color: #00CCBC;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #aaa;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px 24px;
        border-radius: 16px;
      }

      .card h1 {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 7h-1V6a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v9a1 1 0 0 0 1 1h1.05A3.001 3.001 0 0 0 10 17a3 3 0 0 0 5.95-1H19a1 1 0 0 0 1-1v-5a4 4 0 0 0-1-2.76V7zm-9 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm5 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3-4h-5V9h2a2 2 0 0 1 3 2v.09c0 .3-.03.6-.1.91H18z"/>
      </svg>
    </div>

    <h1>Deliveroo Support</h1>
    <p>Need help with an order, refund, or account issue? Chat with our support bot instantly.</p>

    <button class="widget-btn" onclick="openChat()">
      <span class="pulse-dot"></span>
      Click here to chat with us
    </button>

    <div class="divider">or ask about</div>

    <div class="topics">
      <span class="topic-chip" onclick="openChat()">Track my order</span>
      <span class="topic-chip" onclick="openChat()">Request a refund</span>
      <span class="topic-chip" onclick="openChat()">Account help</span>
      <span class="topic-chip" onclick="openChat()">Missing items</span>
      <span class="topic-chip" onclick="openChat()">Payment issues</span>
    </div>

    <p class="footer-note">Typically replies in seconds · Available 24/7</p>
  </div>

  <script type="text/javascript">
    (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '69bd180bdfc7a14c4acd125c' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          voice: {
            url: "https://runtime-api.voiceflow.com"
          }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs";
      v.type = "text/javascript";
      s.parentNode.insertBefore(v, s);
    })(document, 'script');

    function openChat() {
      if (window.voiceflow && window.voiceflow.chat) {
        window.voiceflow.chat.open();
      }
    }
  </script>

</body>
</html>
